<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lee Fácil — Lectura fácil al instante</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f0eb; color: #1a1a2e; }
    header { background: #1e3a8a; color: white; padding: 40px 20px; text-align: center; }
    header h1 { font-size: 3em; margin-bottom: 10px; }
    header p { font-size: 1.2em; opacity: 0.9; }
    .steps { max-width: 600px; margin: 40px auto; padding: 0 20px; }
    .step { background: white; border-radius: 16px; padding: 24px; margin-bottom: 16px; display: flex; align-items: center; gap: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .step span { font-size: 2.5em; }
    .step p { font-size: 1.2em; line-height: 1.5; }
    .step strong { color: #1e3a8a; }
    .download { text-align: center; margin: 40px 20px; }
    .download a { background: #2563eb; color: white; padding: 18px 40px; border-radius: 16px; text-decoration: none; font-size: 1.2em; font-weight: bold; display: inline-block; }
    footer { text-align: center; padding: 30px; color: #6b7280; font-size: 0.9em; }
  </style>
</head>
<body>
  <header>
    <h1>📖 Lee Fácil</h1>
    <p>Convierte cualquier texto difícil en lectura fácil al instante</p>
  </header>

  <div class="steps">
    <div class="step">
      <span>📱</span>
      <p>Sujeta el móvil en <strong>vertical</strong></p>
    </div>
    <div class="step">
      <span>📷</span>
      <p>Pulsa el botón y apunta al texto</p>
    </div>
    <div class="step">
      <span>🔘</span>
      <p>Lee el texto en <strong>palabras sencillas</strong></p>
    </div>
  </div>

  <div class="download">
    <a href="#">Descargar en Google Play</a>
  </div>

  <footer>
    <p>Lee Fácil — Una app de <a href="https://inclusivia.es" style="color:#2563eb">Inclusivia</a></p>
    <p style="margin-top:8px"><a href="privacidad.html" style="color:#2563eb">Política de privacidad</a></p>
  </footer>
</body>
</html>
